<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Forge Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Outfit:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #06060a;
      color: #e8e6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .wrap { max-width: 420px; padding: 24px; }
    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 96px;
      font-weight: 500;
      background: linear-gradient(135deg, #f97316 0%, #fb923c 40%, #2aabee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    p { color: #8b87a0; font-size: 17px; margin-bottom: 32px; line-height: 1.6; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #13131c;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      color: #e8e6f0;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s;
    }
    a:hover { background: #1a1a26; border-color: #5a5672; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>This page doesn't exist yet. Maybe the AI hasn't written it.</p>
    <a href="/">← Back to Forge Code</a>
  </div>
</body>
</html>
